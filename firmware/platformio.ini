; AeroSwarm — ESP32-C3 firmware (PlatformIO)
;
; Two build variants:
;   - demo_sysidN  → full hardware (RGB LED + buzzer + 4-motor MOSFET)
;   - mock_sysidN  → battery-only + onboard LED (lighter assembly)
;
; Flash:
;   pio run -e demo_sysid1 -t upload
;   pio run -e mock_sysid2 -t upload
; OTA (after first USB flash):
;   pio run -e demo_sysid1 -t upload --upload-port 10.105.151.101

[platformio]
default_envs = mock_sysid2

[env]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
lib_deps =
    https://github.com/tzapu/WiFiManager.git
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3

; ── Demo drone (1 board with full peripherals) ────────────────────────
[env:demo_sysid1]
build_flags = ${env.build_flags} -DDEFAULT_SYSID=1 -DDEMO_DRONE=1

; ── Mock drones (battery + onboard LED only) ──────────────────────────
[env:mock_sysid2]
build_flags = ${env.build_flags} -DDEFAULT_SYSID=2

[env:mock_sysid3]
build_flags = ${env.build_flags} -DDEFAULT_SYSID=3

[env:mock_sysid4]
build_flags = ${env.build_flags} -DDEFAULT_SYSID=4

[env:mock_sysid5]
build_flags = ${env.build_flags} -DDEFAULT_SYSID=5
